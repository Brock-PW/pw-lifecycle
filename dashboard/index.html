<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PW Command Center</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:     #0F1C2E;
  --panel:  #182840;
  --card:   #1E3352;
  --hover:  #263F65;
  --border: #253A58;
  --accent: #F5A623;
  --text:   #E8EDF2;
  --muted:  #5B7090;
  --dim:    #2E4060;
  --red:    #E05252;
  --green:  #3DAA6E;
  --blue:   #4A7FBF;
  --purple: #8B7FD4;
}
html,body{height:100%;overflow:hidden}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);display:flex;height:100vh}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
a{color:inherit;text-decoration:none}

/* ── SIDEBAR */
#sidebar{
  width:210px;min-width:210px;background:var(--panel);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow-y:auto;
}
.sb-logo{padding:18px 14px 14px;border-bottom:1px solid var(--border)}
.sb-pw{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--accent);letter-spacing:.12em;text-transform:uppercase}
.sb-name{font-size:15px;font-weight:700;letter-spacing:-.02em;margin-top:2px}
.sb-sub{font-size:10px;color:var(--muted);margin-top:2px}
.sb-section{padding:10px 0;border-bottom:1px solid var(--border)}
.sb-label{font-size:9px;font-weight:600;color:var(--dim);letter-spacing:.15em;text-transform:uppercase;padding:0 14px 5px}
.nav{display:flex;align-items:center;gap:7px;padding:6px 14px;cursor:pointer;font-size:12px;color:var(--muted);transition:.12s;border-left:2px solid transparent}
.nav:hover{background:var(--hover);color:var(--text)}
.nav.on{background:var(--hover);color:var(--accent);border-left-color:var(--accent)}
.nav-badge{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:10px;background:var(--bg);color:var(--muted);padding:1px 5px;border-radius:8px}
.nav-badge.hot{background:rgba(224,82,82,.15);color:var(--red)}
.sb-foot{margin-top:auto;padding:10px 14px;border-top:1px solid var(--border);font-size:10px;color:var(--dim);font-family:'JetBrains Mono',monospace}

/* ── MAIN */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#topbar{height:50px;background:var(--panel);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 22px;gap:12px;flex-shrink:0}
.tb-title{font-size:14px;font-weight:600}
.tb-sub{font-size:11px;color:var(--muted)}
.tb-actions{margin-left:auto;display:flex;gap:8px}
#content{flex:1;overflow-y:auto;padding:22px}

/* ── BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;border:none;font-family:'Inter',sans-serif;transition:.12s}
.btn-primary{background:var(--accent);color:#0F1C2E}
.btn-primary:hover{background:#f0b84a}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--hover);color:var(--text)}
.btn-sm{padding:3px 8px;font-size:11px}
.btn-green{background:rgba(61,170,110,.15);color:var(--green);border:1px solid rgba(61,170,110,.3)}
.btn-green:hover{background:rgba(61,170,110,.25)}

/* ── CARDS / GRID */
.card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:20px}

/* ── STAT CARDS */
.stat-val{font-size:26px;font-weight:700;letter-spacing:-.03em;line-height:1;margin-bottom:3px}
.stat-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
.stat-sub{font-size:10px;color:var(--muted);margin-top:5px}
.bar{height:3px;background:var(--bg);border-radius:2px;overflow:hidden;margin-top:7px}
.bar-fill{height:100%;border-radius:2px;transition:width .4s}

/* ── STAGE CARDS */
.stage-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:13px;cursor:pointer;transition:.15s;position:relative;overflow:hidden}
.stage-card:hover{border-color:var(--accent)}
.stage-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.s1::before{background:#4A7FBF}.s2::before{background:#8B7FD4}.s3::before{background:#3DAA6E}
.s4::before{background:#F5A623}.s5::before{background:#E05252}.s6::before{background:#5B7090}
.s-num{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);margin-bottom:3px}
.s-name{font-size:12px;font-weight:600;margin-bottom:7px}
.s-meta{display:flex;align-items:center;gap:6px;margin-top:7px}
.s-open{font-size:11px;color:var(--muted)}
.s-pill{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:9px;padding:2px 6px;border-radius:8px;text-transform:uppercase}
.pill-prog{background:rgba(245,166,35,.12);color:var(--accent)}
.pill-done{background:rgba(61,170,110,.12);color:var(--green)}
.pill-none{background:rgba(46,64,96,.4);color:var(--muted)}

/* ── TASK TABLE */
.tbl{width:100%;border-collapse:collapse}
.tbl th{font-size:9px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;padding:7px 11px;text-align:left;border-bottom:1px solid var(--border)}
.tbl td{padding:8px 11px;font-size:12px;vertical-align:middle;border-bottom:1px solid rgba(37,58,88,.5)}
.tbl tr.trow{cursor:pointer;transition:.12s}
.tbl tr.trow:hover td{background:var(--hover)}
.tbl tr.done td{opacity:.4}
.tname{font-weight:500;max-width:300px}
.tsub{margin-top:2px;display:flex;gap:4px;align-items:center}

/* ── BADGES */
.hbadge{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:500;padding:2px 5px;border-radius:3px;white-space:nowrap}
.hc{background:rgba(224,82,82,.12);color:#E05252}
.hs{background:rgba(107,127,163,.15);color:#8BA4C8}
.hz{background:rgba(61,170,110,.12);color:#3DAA6E}
.hcl{background:rgba(139,127,212,.15);color:#B8AFEE}
.hd{background:rgba(245,166,35,.12);color:var(--accent)}
.hn{background:rgba(46,64,96,.3);color:var(--muted)}
.qw{background:rgba(61,170,110,.1);color:var(--green);font-family:'JetBrains Mono',monospace;font-size:9px;padding:1px 5px;border-radius:3px}
.bn{background:rgba(139,127,212,.1);color:#B8AFEE;font-family:'JetBrains Mono',monospace;font-size:9px;padding:1px 5px;border-radius:3px}
.pbadge{font-family:'JetBrains Mono',monospace;font-size:9px;padding:2px 5px;border-radius:3px}
.p1{background:rgba(74,127,191,.15);color:#6FA3D8}
.p2{background:rgba(107,127,163,.15);color:#8BA4C8}
.p3{background:rgba(139,127,212,.15);color:#B8AFEE}
.p4{background:rgba(93,93,93,.15);color:#888}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block}
.do{background:var(--accent)}.dc{background:var(--green)}.db{background:var(--red)}.dp{background:var(--blue)}
.oc{font-size:11px;color:var(--muted)}

/* ── FILTERS */
.fbar{display:flex;gap:8px;align-items:center;padding:10px 0;flex-wrap:wrap}
.fsel{background:var(--card);border:1px solid var(--border);color:var(--text);font-family:'Inter',sans-serif;font-size:12px;padding:4px 8px;border-radius:5px;cursor:pointer;outline:none}
.fsel:focus{border-color:var(--accent)}
.finput{background:var(--card);border:1px solid var(--border);color:var(--text);font-family:'Inter',sans-serif;font-size:12px;padding:4px 8px 4px 28px;border-radius:5px;outline:none;width:200px}
.finput:focus{border-color:var(--accent)}
.fwrap{position:relative}
.ficon{position:absolute;left:8px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}
.flbl{font-size:11px;color:var(--muted);margin-left:auto}

/* ── SECTION HEADER */
.sh{display:flex;align-items:baseline;gap:8px;margin-bottom:12px}
.sh-t{font-size:13px;font-weight:600}
.sh-c{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted)}
.divider{height:1px;background:var(--border);margin:20px 0}

/* ── OWNER ROWS */
.orow{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid rgba(37,58,88,.4)}
.orow:last-child{border-bottom:none}
.oname{font-size:12px;font-weight:500;width:65px}
.obar{flex:1;height:3px;background:var(--bg);border-radius:2px;overflow:hidden}
.obar-f{height:100%;border-radius:2px;background:var(--accent)}
.ocount{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);width:22px;text-align:right}

/* ── WORK PANEL */
#overlay{position:fixed;inset:0;background:rgba(10,20,36,.75);z-index:100;backdrop-filter:blur(2px);display:none}
#overlay.show{display:block}
#wpanel{position:fixed;top:0;right:0;bottom:0;width:680px;max-width:92vw;background:var(--panel);border-left:1px solid var(--border);display:flex;flex-direction:column;z-index:101;transform:translateX(100%);transition:transform .22s ease}
#wpanel.show{transform:translateX(0)}
#wp-head{padding:14px 18px;border-bottom:1px solid var(--border)}
#wp-head-top{display:flex;align-items:center;gap:8px;margin-bottom:6px}
#wp-title{font-size:13px;font-weight:600;flex:1}
#wp-meta{display:flex;gap:7px;align-items:center;flex-wrap:wrap}
#wp-msgs{flex:1;overflow-y:auto;padding:14px 18px;display:flex;flex-direction:column;gap:10px}
.msg{max-width:90%;padding:9px 13px;border-radius:8px;font-size:12px;line-height:1.55}
.msg-sys{background:rgba(245,166,35,.07);border:1px solid rgba(245,166,35,.18);color:var(--muted);font-size:11px;max-width:100%;border-radius:6px}
.msg-sys-lbl{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:600;color:var(--accent);letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px}
.msg-u{align-self:flex-end;background:var(--accent);color:#0F1C2E;font-weight:500}
.msg-a{align-self:flex-start;background:var(--card);border:1px solid var(--border);color:var(--text)}
.msg-a p{margin-bottom:7px}.msg-a p:last-child{margin-bottom:0}
.msg-a ul{padding-left:14px;margin:4px 0}.msg-a li{margin-bottom:3px}
.msg-a strong{color:var(--accent)}
.msg-load{align-self:flex-start;background:var(--card);border:1px solid var(--border);padding:9px 14px;border-radius:8px}
.tdot{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--muted);margin:0 2px;animation:bop 1.2s infinite}
.tdot:nth-child(2){animation-delay:.2s}.tdot:nth-child(3){animation-delay:.4s}
@keyframes bop{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
#wp-input-row{padding:12px 18px;border-top:1px solid var(--border);display:flex;gap:8px;align-items:flex-end}
#wp-ta{flex:1;background:var(--card);border:1px solid var(--border);color:var(--text);font-family:'Inter',sans-serif;font-size:13px;padding:8px 11px;border-radius:6px;resize:none;outline:none;line-height:1.45;min-height:38px;max-height:110px}
#wp-ta:focus{border-color:var(--accent)}
#wp-ta::placeholder{color:var(--dim)}
#wp-foot{padding:8px 18px;border-top:1px solid var(--border);display:flex;gap:8px;align-items:center}
#wp-foot-note{font-size:10px;color:var(--dim);flex:1}
.notion-lnk{display:inline-flex;align-items:center;gap:4px;font-size:10px;color:var(--muted);background:var(--bg);border:1px solid var(--border);padding:2px 7px;border-radius:4px;font-family:'JetBrains Mono',monospace;cursor:pointer}
.ndot{width:5px;height:5px;border-radius:50%;background:var(--muted)}
.ndot.live{background:var(--green)}
.notion-banner{display:flex;align-items:center;gap:7px;background:rgba(61,170,110,.1);border:1px solid rgba(61,170,110,.25);border-radius:5px;padding:7px 11px;font-size:11px;color:var(--green);margin-bottom:6px}

/* ── BROCK HIGHLIGHT */
.brow{background:rgba(245,166,35,.03)}
.brow:hover td{background:rgba(245,166,35,.07) !important}

/* ── EMPTY */
.empty{text-align:center;padding:40px;color:var(--muted);font-size:13px}

/* ── BROCK BANNER */
.brock-banner{padding:11px 14px;background:rgba(245,166,35,.06);border:1px solid rgba(245,166,35,.18);border-radius:7px;margin-bottom:18px}
.brock-banner-t{font-size:13px;font-weight:600;color:var(--accent);margin-bottom:3px}
.brock-banner-s{font-size:11px;color:var(--muted)}

/* ── NEXT MOVE CARD */
.next-move{
  background:linear-gradient(135deg,rgba(245,166,35,.10) 0%,rgba(245,166,35,.04) 100%);
  border:1px solid rgba(245,166,35,.35);
  border-radius:10px;padding:20px 22px;margin-bottom:20px;
  display:flex;align-items:center;gap:20px;
}
.nm-left{flex:1;min-width:0}
.nm-eyebrow{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:600;color:var(--accent);letter-spacing:.18em;text-transform:uppercase;margin-bottom:6px}
.nm-task{font-size:16px;font-weight:700;letter-spacing:-.02em;line-height:1.25;margin-bottom:6px}
.nm-why{font-size:12px;color:var(--muted);line-height:1.5}
.nm-btn{flex-shrink:0;background:var(--accent);color:#0F1C2E;border:none;padding:10px 20px;border-radius:7px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;transition:.12s;white-space:nowrap}
.nm-btn:hover{background:#f0b84a;transform:translateY(-1px)}

/* ── SECONDARY MOVES */
.secondary-moves{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:22px}
.sm-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:13px;cursor:pointer;transition:.15s}
.sm-card:hover{border-color:rgba(245,166,35,.4);background:var(--hover)}
.sm-eyebrow{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px}
.sm-name{font-size:12px;font-weight:600;line-height:1.35;margin-bottom:6px}
.sm-foot{display:flex;align-items:center;gap:6px}

/* ── BUILD PATH */
.build-path{margin-bottom:22px}
.bp-label{font-size:9px;font-weight:600;color:var(--muted);letter-spacing:.15em;text-transform:uppercase;margin-bottom:10px}
.bp-track{display:flex;align-items:center;gap:0}
.bp-phase{flex:1;position:relative}
.bp-phase-inner{
  background:var(--card);border:1px solid var(--border);
  border-radius:7px;padding:11px 13px;
  transition:.15s;cursor:default;
}
.bp-phase.current .bp-phase-inner{
  border-color:var(--accent);
  background:rgba(245,166,35,.07);
}
.bp-phase.done .bp-phase-inner{
  border-color:rgba(61,170,110,.3);
  background:rgba(61,170,110,.05);
}
.bp-phase.locked .bp-phase-inner{opacity:.45}
.bp-num{font-family:'JetBrains Mono',monospace;font-size:9px;margin-bottom:3px}
.bp-phase.done .bp-num{color:var(--green)}
.bp-phase.current .bp-num{color:var(--accent)}
.bp-phase.locked .bp-num{color:var(--muted)}
.bp-name{font-size:11px;font-weight:600;margin-bottom:3px}
.bp-sub{font-size:10px;color:var(--muted);line-height:1.4}
.bp-arrow{width:28px;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:var(--border);font-size:14px;padding-top:4px}
.bp-you{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--accent);font-weight:600;letter-spacing:.08em;margin-top:4px}

/* ── TODAY'S WORK COLUMNS */
.work-cols{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:22px}
.wc{background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.wc-head{padding:11px 13px 9px;border-bottom:1px solid var(--border)}
.wc-title{font-size:12px;font-weight:700;margin-bottom:2px}
.wc-sub{font-size:10px;color:var(--muted)}
.wc-body{padding:4px 0}
.wc-item{display:flex;align-items:flex-start;gap:9px;padding:8px 13px;cursor:pointer;transition:.12s;border-bottom:1px solid rgba(37,58,88,.35)}
.wc-item:last-child{border-bottom:none}
.wc-item:hover{background:var(--hover)}
.wc-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:4px}
.wc-text{font-size:11px;font-weight:500;line-height:1.4;flex:1}
.wc-empty{padding:16px 13px;font-size:11px;color:var(--muted);font-style:italic}

/* ── WAITING SECTION */
.waiting-section{margin-bottom:22px}
.waiting-row{display:flex;align-items:center;gap:10px;padding:8px 13px;border-bottom:1px solid rgba(37,58,88,.4);font-size:11px;color:var(--muted)}
.waiting-row:last-child{border-bottom:none}
.waiting-name{flex:1}
.waiting-owner{font-family:'JetBrains Mono',monospace;font-size:10px}

/* ── PROGRESS SENTENCE */
.progress-sentence{
  font-size:12px;color:var(--muted);
  background:var(--card);border:1px solid var(--border);
  border-radius:7px;padding:11px 14px;
  margin-bottom:20px;line-height:1.6;
}
.progress-sentence strong{color:var(--text)}
</style>
</head>
<body>

    <div class="sb-pw">PW</div>
    <div class="sb-name">Command Center</div>

      Brock's List

    <div id="stage-nav"></div>
  </div>
  <div class="sb-section">
    <div class="sb-label">Quick Links</div>
    <div class="nav" onclick="window.open('https://notion.so/35e2e7f35b1f812d8e7cec432f027512','_blank')">
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
      Notion Brain
      <svg width="9" height="9" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="margin-left:auto;opacity:.4"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
    </div>
    <div class="nav" onclick="window.open('https://pwcustomerlifecycle.netlify.app','_blank')">

// ── NEXT MOVE LOGIC
// Priority: Leverage → Revenue (by revOrder 1-5) → Completeness → never Francis
function actionable(t){
  return effectiveStatus(t)!=="complete" && effectiveStatus(t)!=="blocked" && t.tier!=="francis";
}
function tierScore(t){
  // Leverage stages 1-2 first (enable lead capture before anything else)
  if(t.tier==="leverage" && (t.s===1||t.s===2)) return 0 + (t.s||9);
  // Revenue in sequence (DIR→Ads→Social→Outreach→Consultation)
  if(t.tier==="revenue")      return 20 + (t.revOrder||9)*10;
  // Leverage stages 3-6 (build as clients start arriving)
  if(t.tier==="leverage" && t.s>=3) return 120 + (t.s||9);
  // Leverage cross-cutting (s=0, e.g. Gmail connections)
  if(t.tier==="leverage")     return 10;
  // Completeness last
  if(t.tier==="completeness") return 300;
  return 400;
}
function sortedActionable(){
  return TASKS.filter(actionable).sort((a,b)=>{
    const ts=tierScore(a)-tierScore(b);
    if(ts!==0) return ts;
    const ao=a.owner==="Brock"?0:1, bo=b.owner==="Brock"?0:1;
    if(ao!==bo) return ao-bo;
    return (a.phase||9)-(b.phase||9);
  });
}
function pickNextMove(){ return sortedActionable()[0]||null; }

function nextMoveWhy(t){
  if(t.tier==="leverage") return "Leverage task — complete once, Claude takes over permanently. Every leverage task done now frees you from a recurring manual job forever.";
  if(t.tier==="revenue"&&t.revOrder===1) return "DIR data seeds everything — Customer Match, lookalike campaigns, B2B Rocket sequences all flow from this list. Highest-priority revenue task.";
  if(t.tier==="revenue"&&t.revOrder===2) return "Google Ads runs on autopilot once live. The DIR list is the targeting seed — get paid acquisition flowing before social or outreach.";
  if(t.tier==="revenue"&&t.revOrder===3) return "Social builds brand and feeds Meta Ads lookalike audiences. Establishing presence now means outreach sequences land in a warmer market.";
  if(t.tier==="revenue"&&t.revOrder===4) return "B2B Rocket performs better with brand established and DIR audience warm. Now is the right time.";
  if(t.tier==="revenue"&&t.revOrder===5) return "Consultation conversion optimizes the pipeline now flowing from DIR, ads, and social. Every improvement here compounds across every lead.";
  if(t.hook==="decision") return "A decision only you can make. Other tasks are waiting on this call.";
  return "Phase 1 priority — every stage documented gets you one step closer to the sync layer and a business that runs itself.";
}

function pickSecondaryMoves(excludeId){
  return sortedActionable().filter(t=>t.id!==excludeId).slice(0,3);
}

function smLabel(t){
  const tierLabels={"leverage":"Leverage","revenue":"Revenue","completeness":"Completeness","francis":"Francis"};
  const tierColors={"leverage":"var(--blue)","revenue":"var(--green)","completeness":"var(--muted)","francis":"var(--muted)"};
  const rev=t.revOrder?[,"DIR first","Google Ads","Social","Outreach","Consultation"][t.revOrder]:"";
  const lbl=tierLabels[t.tier]||(t.tier||"");
  return {text:rev?`${lbl} · ${rev}`:lbl, color:tierColors[t.tier]||"var(--muted)"};
}

function filterTasks(){
  return TASKS.filter(t=>{
    const st=effectiveStatus(t);
    if(fOwner!=="All"&&t.owner!==fOwner) return false;
    if(fStage!=="All"&&String(t.s)!==String(fStage)) return false;
    if(fHook!=="All"&&t.hook!==fHook) return false;
    if(fStatus!=="All"&&st!==fStatus) return false;
    if(fSearch&&!t.name.toLowerCase().includes(fSearch.toLowerCase())) return false;
    return true;
  });
}

function renderTasksBody(){
  const filtered=filterTasks();
  const el=document.getElementById("tasks-body");
  const fc=document.getElementById("ftcount");
  if(el) el.innerHTML=filtered.map(t=>taskRowFull(t)).join("");
  if(fc) fc.textContent=filtered.length+" tasks";

}

  const st=effectiveStatus(t);
  const sg=STAGES.find(s=>s.n===t.s);
  return `<tr class="trow brow${st==="complete"?" done":""}" data-id="${t.id}">
    <td>${dotHtml(st)}</td>
    <td class="tname">${t.name}
      <div class="tsub">${t.qw?'<span class="qw">QUICK WIN</span>':""}${t.bn?'<span class="bn">BUILDABLE NOW</span>':""}</div>
    </td>
    <td><span style="font-size:11px;color:${sg?sg.color:'var(--muted)'}">${sg?`Stage ${t.s}`:"—"}</span></td>
    <td>${hbadge(t.hook)}</td>
    <td>${pbadge(t.phase)}</td>
    <td><button class="btn btn-primary btn-sm" onclick="event.stopPropagation();openTask('${t.id}')">⚡ Work on it</button></td>
  </tr>`;
}

// ═══════════════════════════════════════════════════════════
// ROW CLICK
// ═══════════════════════════════════════════════════════════
function attachRowClicks(){
  document.querySelectorAll(".trow[data-id]").forEach(row=>{
    row.onclick=()=>openTask(row.dataset.id);
  });
}

// ═══════════════════════════════════════════════════════════
// WORK PANEL
// ═══════════════════════════════════════════════════════════
function openTask(id){
  currentTask = TASKS.find(t=>t.id===id);
  if(!currentTask) return;
  const t = currentTask;
  const sg = STAGES.find(s=>s.n===t.s);
  const nurl = "https://notion.so/"+(NOTION[t.np]||NOTION.main);

  document.getElementById("wp-title").textContent = t.name;
  document.getElementById("wp-meta").innerHTML = `
    ${sg?`<span style="font-size:11px;font-weight:600;color:${sg.color}">Stage ${t.s} — ${sg.name}</span>`:""}
    ${hbadge(t.hook)}
    ${pbadge(t.phase)}
    <span class="oc">${t.owner}</span>
    <a href="${nurl}" target="_blank" style="margin-left:auto">
      <span class="notion-lnk" id="notion-lnk-badge">
        <span class="ndot" id="notion-dot"></span>Notion → Destination
      </span>
    </a>
  `;

  document.getElementById("overlay").classList.add("show");
  document.getElementById("wpanel").classList.add("show");

  loadConvo();
}

function closePanel(){
  document.getElementById("overlay").classList.remove("show");
  document.getElementById("wpanel").classList.remove("show");
  currentTask = null;
}

function loadConvo(){
  if(!currentTask) return;
  const saved = getConvo(currentTask.id);
  const msgsEl = document.getElementById("wp-msgs");

  if(saved && saved.length){
    msgsEl.innerHTML = renderMessages(saved);
    msgsEl.scrollTop = msgsEl.scrollHeight;
  } else {
    msgsEl.innerHTML = "";
    initConvo();
  }
}

async function initConvo(){
  if(!currentTask) return;
  const t = currentTask;
  const msgsEl = document.getElementById("wp-msgs");
  msgsEl.innerHTML = loadingBubble();

  const sysPrompt = buildSysPrompt(t);
  const initMsg = `I'm opening the work session for: "${t.name}". Give me a sharp 3-4 sentence brief on what we're building, what decision or output is needed to complete this task, and your first concrete question or proposed first step. Be direct — I know the business.`;

  try {
    const reply = await callAPI(sysPrompt, [{role:"user",content:initMsg}]);
    const msgs = [{role:"user",content:initMsg},{role:"assistant",content:reply}];
    setConvo(t.id, msgs);
    msgsEl.innerHTML = renderMessages(msgs);
    msgsEl.scrollTop = msgsEl.scrollHeight;
  } catch(e) {
    msgsEl.innerHTML = `<div class="msg msg-a">Error starting session: ${e.message}</div>`;
  }
}

async function sendMsg(){
  if(!currentTask || panelLoading) return;
  const ta = document.getElementById("wp-ta");
  const txt = ta.value.trim();
  if(!txt) return;
  ta.value = ""; ta.style.height="38px";

  const saved = getConvo(currentTask.id) || [];
  const msgs = [...saved, {role:"user",content:txt}];
  setConvo(currentTask.id, msgs);

  const msgsEl = document.getElementById("wp-msgs");
  msgsEl.innerHTML = renderMessages(msgs) + loadingBubble();
  msgsEl.scrollTop = msgsEl.scrollHeight;

  panelLoading = true;
  try {
    const reply = await callAPI(buildSysPrompt(currentTask), msgs);
    const final = [...msgs, {role:"assistant",content:reply}];
    setConvo(currentTask.id, final);
    msgsEl.innerHTML = renderMessages(final);
    msgsEl.scrollTop = msgsEl.scrollHeight;
    if(reply.includes("TASK_COMPLETE")) markDone();
  } catch(e) {
    msgsEl.innerHTML += `<div class="msg msg-a">Error: ${e.message}</div>`;
  }
  panelLoading = false;
}

function markDone(){
  if(!currentTask) return;
  setStatus(currentTask.id, "complete");
  updateBadges();
  if(currentTab==="overview") renderOverview();
  else if(currentTab==="tasks") renderTasksBody();
  else renderBrock();

  const ndot = document.getElementById("notion-dot");
  const nbadge = document.getElementById("notion-lnk-badge");
  if(ndot) ndot.classList.add("live");
  if(nbadge) nbadge.innerHTML = '<span class="ndot live"></span>✓ Complete';

  const msgsEl = document.getElementById("wp-msgs");
  msgsEl.insertAdjacentHTML("afterbegin",`
    <div class="notion-banner">
      ✓ Task marked complete — remember to save output to Notion
    </div>`);
}

function resetConvo(){
  if(!currentTask) return;
  if(!confirm("Clear this conversation and start fresh?")) return;
  setConvo(currentTask.id, null);
  loadConvo();
}

// ═══════════════════════════════════════════════════════════
// RENDER MESSAGES
// ═══════════════════════════════════════════════════════════
function renderMessages(msgs){
  return msgs.map((m,i)=>{
    if(m.role==="user" && i===0) return ""; // hide init prompt
    if(m.role==="user") return `<div class="msg msg-u">${escHtml(m.content)}</div>`;
    return `<div class="msg msg-a">${markdownToHtml(m.content)}</div>`;
  }).join("");
}

function loadingBubble(){
  return `<div class="msg-load"><span class="tdot"></span><span class="tdot"></span><span class="tdot"></span></div>`;
}

function escHtml(t){
  return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function markdownToHtml(text){
  // Bold
  text = text.replace(/\*\*(.*?)\*\*/g,"<strong>$1</strong>");
  // Code inline
  text = text.replace(/`([^`]+)`/g,"<code style='background:rgba(255,255,255,.07);padding:1px 4px;border-radius:3px;font-family:monospace;font-size:11px'>$1</code>");
  // Lines
  const lines = text.split('\n');
  let html="", inUl=false;
  lines.forEach(line=>{
    if(line.startsWith("- ")||line.startsWith("• ")){
      if(!inUl){html+="<ul>";inUl=true;}
      html+=`<li>${line.slice(2)}</li>`;
    } else {
      if(inUl){html+="</ul>";inUl=false;}
      if(line.trim()==="") html+="";
      else html+=`<p>${line}</p>`;
    }
  });
  if(inUl) html+="</ul>";
  return html;
}

// ═══════════════════════════════════════════════════════════
// API
// ═══════════════════════════════════════════════════════════
async function callAPI(system, messages){
  const res = await fetch("/.netlify/functions/claude",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      model:"claude-sonnet-4-6",
      max_tokens:1000,
      system,
      messages
    })
  });
  const data = await res.json();
  if(data.error) throw new Error(data.error.message);
  return data.content.find(b=>b.type==="text")?.text || "";
}

function buildSysPrompt(t){
  const sg=STAGES.find(s=>s.n===t.s);
  const nurl="https://notion.so/"+(NOTION[t.np]||NOTION.main);
  return `You are the Wizard of PW — the AI operating system for Prevailing Wisdom, a California labor compliance company. You are running inside the PW Command Center dashboard.

COMPANY: Prevailing Wisdom — Labor Compliance Simplified
SERVICES: CPR production, DAS 140/142 filing, ECPR uploads to CA DIR, fringe benefit statements, training contributions, project closeout.
TEAM: Brock (Owner/strategy/sales), Rachel (Owner/billing/compliance), Francis (Owner/technical — document automation), Megan (Owner/industry expert), Anthy (Account manager), Bobby (EA/fulfillment).

CURRENT TASK: ${t.name}
STAGE: ${sg?sg.name:"Cross-cutting"}
HOOK TYPE: ${HLABELS[t.hook]||t.hook}
OWNER: ${t.owner}
PHASE: ${t.phase}
NOTION DESTINATION: ${nurl}

TASK CONTEXT:
${t.ctx}

YOUR JOB: Work with Brock to complete this task. Be direct and expert. Don't over-explain PW basics — Brock knows the business.

HARD RULES:
- Soft side (Claude/Brock) = customer-facing, relational, lifecycle work. Build this.
- Hard side (Francis/Compex) = document production, platform submission. NEVER build or approximate. Leave hooks named.
- Zoho is updated by automation only — never by humans logging in manually.
- Every task completion must update Notion. When the output is ready, confirm with Brock before writing.

When the work is complete and ready to save, confirm with Brock. When fully done, include TASK_COMPLETE in your response.`;
}

// ═══════════════════════════════════════════════════════════
// TEXTAREA AUTO-RESIZE + ENTER
// ═══════════════════════════════════════════════════════════
document.getElementById("wp-ta").addEventListener("keydown",function(e){
  if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMsg();}
});
document.getElementById("wp-ta").addEventListener("input",function(){
  this.style.height="auto";
  this.style.height=Math.min(this.scrollHeight,110)+"px";
});

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
updateBadges();
showTab("overview");
</script>
